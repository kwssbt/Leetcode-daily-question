name: LeetCode Daily Automation

on:
  schedule:
    # 每天北京时间 00:00 运行 (对应 UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch:      # 保持手动触发功能，方便调试

jobs:
  run-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Fonts for PDF Rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python Packages
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Execute Daily Script
        run: python leetcode_daily.py

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "LeetCodeBot"
          git config --global user.email "bot@github.com"
          git add .
          # 检查是否有文件更新，避免没有更新时报错
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Update daily problem $(date +'%Y-%m-%d')"
          git push origin main