name: LeetCode Daily Auto-Fetch

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间 00:00
  workflow_dispatch: 

# 核心修复：显式声明写入权限，解决 Exit Code 128
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        # 升级到了 v4，消除 Node.js 20 弃用警告
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 2. Set up Python
        # 升级到了 v5，消除 Node.js 20 弃用警告
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 使用稳定的 3.11 避免兼容性问题

      - name: 3. Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium

      - name: 4. Run Crawler Script
        run: |
          python leetcode_daily.py

      - name: 5. Commit and Push
        run: |
          git config --global user.name "LeetCodeBot"
          git config --global user.email "bot@github.com"
          
          # 检查是否有内容变更
          git add .
          if ! git diff --staged --quiet; then
            # 先拉取远程变更防止冲突
            git pull origin main --rebase
            git commit -m "Auto: Update daily problem $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes to commit."
          fi