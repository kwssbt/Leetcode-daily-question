name: LeetCode Daily Auto-Fetch

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间 00:00
  workflow_dispatch: 

# 显式声明权限，双重保险修复 Exit Code 128
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4 # 升级到 v4
        with:
          fetch-depth: 0 

      - name: 2. Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.11' 

      - name: 3. Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium

      - name: 4. Run Crawler Script
        run: |
          python leetcode_daily.py

      - name: 5. Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 注入官方 Token
        run: |
          # 1. 配置身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 重新设置远程仓库地址，带上 Token 确保绝对拥有权限
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # 3. 检查变更并处理
          git add .
          if ! git diff --staged --quiet; then
            # 使用 rebase 避免产生多余的 Merge commit
            git pull origin main --rebase
            git commit -m "Auto: Update daily problem $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes detected, skipping push."
          fi